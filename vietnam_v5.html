<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>胡志明市旅行攻略 Pro | HCMC Travel Guide Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f0f2f5;--card:rgba(255,255,255,.85);--card-solid:#fff;--text:#1d1d1f;--text2:#6e6e73;--accent:#0071e3;--accent2:#5856d6;--border:rgba(0,0,0,.08);--red:#ff3b30;--orange:#ff9500;--yellow:#ffcc00;--green:#34c759;--purple:#af52de;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,.06);--glass:rgba(255,255,255,.7)}
[data-theme="dark"]{--bg:#000;--card:rgba(28,28,30,.85);--card-solid:#1c1c1e;--text:#f5f5f7;--text2:#98989d;--border:rgba(255,255,255,.1);--shadow:0 4px 24px rgba(0,0,0,.3);--glass:rgba(28,28,30,.7)}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);opacity:.03;z-index:-1}

.header{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 12px}
.header-top{display:flex;gap:6px;align-items:center}
.logo{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.search-box{flex:1;min-width:0;padding:10px 12px;border:1px solid var(--border);border-radius:12px;font-size:15px;background:var(--bg);color:var(--text);transition:.2s}
.search-box:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
.icon-btn{width:40px;height:40px;min-width:40px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.icon-btn:active{transform:scale(.92);background:var(--accent);color:#fff}

.toolbar{display:flex;gap:6px;align-items:center;overflow-x:auto;overflow-y:hidden;margin-top:8px;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none;scroll-snap-type:x mandatory}
.toolbar::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:.15s;user-select:none;white-space:nowrap;flex-shrink:0;scroll-snap-align:start;min-height:36px}
.chip:active{transform:scale(.95)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .count{margin-left:4px;opacity:.7}
.sort-btn{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:.15s;white-space:nowrap;flex-shrink:0;min-height:36px}
.sort-btn:active{transform:scale(.95)}
.sort-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}

.members-row{display:flex;gap:6px;align-items:center;overflow-x:auto;margin-top:8px;padding:8px 0 0;border-top:1px solid var(--border);scrollbar-width:none}
.members-row::-webkit-scrollbar{display:none}
.member-tag{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:14px;font-size:13px;background:linear-gradient(135deg,#e8f0fe,#f0e6ff);color:var(--accent);font-weight:500;white-space:nowrap;flex-shrink:0}
.member-tag .rm{cursor:pointer;opacity:.5;font-size:16px;padding:2px}
.add-member{padding:6px 12px;border-radius:14px;font-size:13px;border:1px dashed var(--accent);background:transparent;color:var(--accent);cursor:pointer;transition:.15s;white-space:nowrap;flex-shrink:0;min-height:34px}
.add-member:active{background:var(--accent);color:#fff}

.stats-bar{display:flex;gap:12px;padding:8px 12px;font-size:12px;color:var(--text2);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-item{display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.main{padding:8px 12px;padding-bottom:80px}
.tabs{display:flex;gap:2px;margin-bottom:10px;background:var(--card);border-radius:12px;padding:3px;border:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:8px 4px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:.15s;color:var(--text2);white-space:nowrap;min-height:36px}
.tab:active{transform:scale(.95)}
.tab.active{background:var(--accent);color:#fff}

.grid{display:grid;grid-template-columns:1fr;gap:10px}
.card{background:var(--card-solid);border:1px solid var(--border);border-radius:var(--radius);padding:12px;transition:box-shadow .2s;position:relative}
.card:active{box-shadow:var(--shadow)}
.hidden{display:none!important}
.card.hidden{display:none}
.card-img-wrap{position:relative;width:calc(100% + 24px);margin:-12px -12px 10px -12px;height:160px;overflow:hidden;border-radius:12px 12px 0 0;background:#f0f0f0;cursor:pointer}
.carousel{display:flex;width:100%;height:100%;transition:transform .3s ease}
.carousel img{width:100%;height:100%;object-fit:cover;flex-shrink:0}
.cbtn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.45);color:#fff;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;z-index:5;display:none;align-items:center;justify-content:center}
.cbtn:active{background:rgba(0,0,0,.7)}
.card-img-wrap:hover .cbtn,.card-img-wrap:active .cbtn{display:flex}
.cbtn-prev{left:6px}
.cbtn-next{right:6px}
.ccounter{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;z-index:5}
.xhs-badge{position:absolute;top:6px;left:6px;background:rgba(255,48,64,.85);color:#fff;padding:3px 8px;border-radius:8px;font-size:11px;text-decoration:none;z-index:5}
.card-star{position:absolute;top:6px;right:6px;font-size:16px;cursor:pointer;padding:4px;z-index:5;background:rgba(0,0,0,.35);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:#fff;opacity:.8}
.card-star:active{transform:scale(1.1);opacity:1}
.card-star.starred{opacity:1;background:rgba(255,180,0,.85)}
.card-edit{position:absolute;top:6px;right:40px;font-size:13px;cursor:pointer;background:rgba(0,0,0,.35);border:none;z-index:5;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:.8}
.card-edit:active{opacity:1;transform:scale(1.1)}
.card-head{margin-bottom:6px}
.card-title{font-size:16px;font-weight:600;user-select:text;cursor:text;line-height:1.3}
.card-title-en{font-size:12px;color:var(--text2);margin-top:2px;user-select:text;cursor:text}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.badge-pri-red{background:#ffe5e5;color:var(--red)}
.badge-pri-yellow{background:#fff8e1;color:#f57c00}
.badge-pri-white{background:#f0f0f0;color:#666}
[data-theme="dark"] .badge-pri-white{background:#3a3a3c;color:#999}
.badge-time{background:#f0f0f0;color:#555}
[data-theme="dark"] .badge-time{background:#3a3a3c;color:#bbb}
.badge-district{background:#e8f5e9;color:#2e7d32}
[data-theme="dark"] .badge-district{background:#1b3a1b;color:#81c784}
.badge-price{background:#fff3e0;color:#e65100}
[data-theme="dark"] .badge-price{background:#3d2a00;color:#ffb74d}
.card-info{font-size:13px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.card-desc{font-size:13px;margin-top:4px;user-select:text;cursor:text;line-height:1.4}
.card-notes{font-size:12px;color:var(--accent);font-style:italic;margin-top:4px}
.card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.vote-btn{padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);transition:.12s;min-height:36px}
.vote-btn:active{transform:scale(.92)}
.vote-btn.voted{font-weight:600}
.vote-btn.v-yes{background:#d4edda;color:#155724;border-color:#c3e6cb}
.vote-btn.v-no{background:#f8d7da;color:#721c24;border-color:#f5c6cb}
.vote-btn.v-maybe{background:#fff3cd;color:#856404;border-color:#ffeeba}
[data-theme="dark"] .vote-btn.v-yes{background:#1b4332;color:#95d5b2;border-color:#2d6a4f}
[data-theme="dark"] .vote-btn.v-no{background:#4a1c1c;color:#f5a3a3;border-color:#6b2c2c}
[data-theme="dark"] .vote-btn.v-maybe{background:#4a3f1c;color:#f5d98a;border-color:#6b5a2c}
.voter-label{font-size:11px;color:var(--text2);font-weight:500}
.day-select{padding:6px 8px;border-radius:8px;font-size:13px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;min-height:36px}
.note-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-top:6px;background:var(--bg);color:var(--text);resize:none;min-height:36px}
.note-input:focus{outline:none;border-color:var(--accent)}
.votes-summary{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text2)}
.summary-bar{display:flex;gap:8px;align-items:center}
.summary-bar span{display:flex;align-items:center;gap:3px}

.district-view .district-group{margin-bottom:20px}
.district-title{font-size:16px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:6px}
.district-count{font-size:12px;font-weight:400;color:var(--text2)}

.day-view .day-column{margin-bottom:20px}
.day-header{font-size:16px;font-weight:700;margin-bottom:10px;padding:10px 14px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;justify-content:space-between;align-items:center}
.day-header .day-stats{font-size:12px;opacity:.8}
.day-items{min-height:50px;border:2px dashed var(--border);border-radius:var(--radius);padding:6px;transition:.2s}
.day-placeholder{padding:16px;text-align:center;color:var(--text2);font-size:13px}
.day-item{background:var(--card-solid);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;transition:.15s}
.day-item:active{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.day-item-name{font-size:13px;font-weight:500}
.day-item-meta{font-size:11px;color:var(--text2)}
.day-item-remove{cursor:pointer;color:var(--red);opacity:.5;font-size:18px;padding:4px}
.day-item-remove:active{opacity:1}

.stats-panel{background:var(--card-solid);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stats-title{font-size:16px;font-weight:600;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stats-card{background:var(--bg);border-radius:12px;padding:12px}
.stats-card-title{font-size:11px;color:var(--text2);margin-bottom:4px}
.stats-card-value{font-size:20px;font-weight:700}
.stats-bar-chart{margin-top:8px}
.stats-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.stats-bar-label{font-size:11px;width:60px;text-align:right;color:var(--text2);flex-shrink:0}
.stats-bar-track{flex:1;height:16px;background:var(--bg);border-radius:8px;overflow:hidden}
.stats-bar-fill{height:100%;border-radius:8px;transition:width .5s ease}
.stats-bar-value{font-size:10px;width:24px;color:var(--text2)}

.budget-bar{display:flex;gap:8px;align-items:center;padding:10px 12px;background:var(--card-solid);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;flex-wrap:wrap}
.budget-label{font-size:13px;color:var(--text2)}
.budget-value{font-size:16px;font-weight:700;color:var(--green)}
.budget-input{width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px;text-align:right;background:var(--bg);color:var(--text)}
.budget-input:focus{outline:none;border-color:var(--accent)}
.budget-unit{font-size:12px;color:var(--text2)}

.route-card{background:var(--card-solid);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.route-title{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.route-items{display:flex;flex-wrap:wrap;gap:6px}
.route-chip{padding:6px 10px;border-radius:8px;font-size:12px;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:.15s;min-height:34px}
.route-chip:active{background:var(--accent);color:#fff;border-color:var(--accent)}

.export-panel{display:none}

.settings-overlay{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.4)}
.settings-overlay.show{display:block}
.settings-panel{position:fixed;top:0;right:0;bottom:0;width:min(320px,85vw);background:var(--card-solid);z-index:151;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(20px,env(safe-area-inset-bottom))}
.settings-panel.show{transform:translateX(0)}
.settings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.settings-title{font-size:18px;font-weight:600}
.settings-close{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.settings-section{margin-bottom:20px}
.settings-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.settings-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.settings-input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--bg);color:var(--text)}
.settings-input:focus{outline:none;border-color:var(--accent)}
.settings-btn{padding:10px 16px;border-radius:10px;font-size:14px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);transition:.15s;text-align:center}
.settings-btn:active{transform:scale(.95)}
.settings-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.settings-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.settings-tag{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:12px;font-size:13px;background:linear-gradient(135deg,#e8f0fe,#f0e6ff);color:var(--accent);font-weight:500}
.settings-tag .rm{cursor:pointer;opacity:.5;font-size:16px;padding:2px}
.settings-divider{height:1px;background:var(--border);margin:16px 0}
.settings-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.settings-item:last-child{border-bottom:none}
.settings-item-label{font-size:14px}
.settings-item-value{font-size:13px;color:var(--text2)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--card-solid);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 -4px 30px rgba(0,0,0,.15);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{margin-bottom:14px;font-size:18px;font-weight:600}
.modal input,.modal select,.modal textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;font-size:15px;margin-bottom:10px;background:var(--bg);color:var(--text)}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;padding-bottom:env(safe-area-inset-bottom)}
.modal-btn{padding:12px 24px;border-radius:12px;font-size:15px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);transition:.15s;min-height:44px}
.modal-btn:active{transform:scale(.95)}
.modal-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;background:#333;color:#fff;font-size:13px;z-index:300;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.scroll-top{position:fixed;bottom:80px;left:12px;width:44px;height:44px;border-radius:50%;background:var(--card-solid);border:1px solid var(--border);cursor:pointer;font-size:18px;display:none;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:98;transition:.15s}
.scroll-top:active{transform:scale(.9)}
.scroll-top.show{display:flex}

.map-container{background:var(--card-solid);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px}
.map-title{font-size:14px;font-weight:600;margin-bottom:10px}
.map-grid{display:grid;grid-template-columns:1fr;gap:8px}
.map-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:.15s}
.map-card:active{border-color:var(--accent);transform:scale(.98)}
.map-card-name{font-size:14px;font-weight:600;margin-bottom:2px}
.map-card-addr{font-size:12px;color:var(--text2)}
.map-card-link{font-size:11px;color:var(--accent);margin-top:4px;text-decoration:none}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .2s ease}

.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);color:#fff;border:none;width:48px;height:48px;border-radius:50%;cursor:pointer;font-size:28px;backdrop-filter:blur(4px)}
.lightbox-nav:active{background:rgba(255,255,255,.4)}
.lightbox-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);color:#fff;border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:20px;backdrop-filter:blur(4px)}
.lightbox-copy{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.2);color:#fff;border:none;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;backdrop-filter:blur(4px)}

@media(min-width:768px){
.grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}
.header{padding:12px 20px}
.main{padding:16px 20px;padding-bottom:40px}
.tabs{flex-wrap:nowrap}
.stats-grid{grid-template-columns:repeat(4,1fr)}
.map-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.settings-panel{width:360px}
}
</style>
</head>
<body>
<div class="header">
<div class="header-top">
<input class="search-box" id="search" placeholder="🔍 搜索景点..." onkeydown="if(event.key==='Escape')this.value='';renderAll()">
<button class="icon-btn" onclick="showModal('addItem')">➕</button>
<button class="icon-btn" onclick="toggleSettings()">⚙️</button>
</div>
<div class="toolbar" id="toolbar"></div>
</div>
<div class="stats-bar" id="statsBar"></div>

<div class="main">
<div class="tabs">
<div class="tab active" data-view="cards" onclick="switchView('cards')">📋 全部景点</div>
<div class="tab" data-view="district" onclick="switchView('district')">📍 区域分布</div>
<div class="tab" data-view="days" onclick="switchView('days')">📅 行程规划</div>
<div class="tab" data-view="route" onclick="switchView('route')">🗺️ 路线优化</div>
<div class="tab" data-view="stats" onclick="switchView('stats')">📊 统计面板</div>
</div>

<div id="viewCards">
<div style="font-size:12px;color:var(--text2);text-align:center;padding:4px">已选 <span id="selectedCount">0</span> 项</div>
<div class="grid" id="grid"></div>
</div>

<div id="viewDistrict" class="hidden">
<div class="map-container" id="mapContainer"></div>
<div class="district-view" id="districtView"></div>
</div>

<div id="viewDays" class="hidden">
<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
<button class="modal-btn primary" onclick="showModal('addDay')">+ 添加天数</button>
<button class="modal-btn" onclick="clearDays()">🗑️ 清空行程</button>
<button class="modal-btn" onclick="autoPlan()">✨ 智能规划</button>
</div>

function t(zh,en){return lang==="en"?en:zh}

function getFiltered(){
const q=searchTerm.toLowerCase();
return allItems.filter(it=>{
if(activeCats.size&&!activeCats.has(it.cat))return false;
if(activePri.size&&!activePri.has(it.pri))return false;
if(q&&!it.name.toLowerCase().includes(q)&&!it.nameEn.toLowerCase().includes(q)&&!it.notes.toLowerCase().includes(q)&&!it.notesEn.toLowerCase().includes(q)&&!it.district.toLowerCase().includes(q))return false;
return true;
});
}

function sortItems(items){
const p={red:0,yellow:1,white:2};
const arr=[...items];
if(sortBy==="priority")return arr.sort((a,b)=>p[a.pri]-p[b.pri]);
if(sortBy==="district")return arr.sort((a,b)=>a.district.localeCompare(b.district));
if(sortBy==="name")return arr.sort((a,b)=>a.name.localeCompare(b.name));
if(sortBy==="price")return arr.sort((a,b)=>a.price-b.price);
if(sortBy==="votes"){
return arr.sort((a,b)=>{
const va=Object.values(votes[a.id]||{}).filter(v=>v==="yes").length;
const vb=Object.values(votes[b.id]||{}).filter(v=>v==="yes").length;
return vb-va;
});
}
return arr;
}

async function fetchXhsImages(url){
showToast(t("正在获取小红书照片...","Fetching XHS photos..."));
let realUrl=url;
if(url.includes("xhslink.com")||url.includes("xhs.link")){
try{
const res=await fetch(url,{redirect:"follow"});
realUrl=res.url;
}catch(e){}
}
const proxies=[
`https://api.allorigins.win/raw?url=${encodeURIComponent(realUrl)}`,
`https://corsproxy.io/?${encodeURIComponent(realUrl)}`,
`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(realUrl)}`
];
for(const proxyUrl of proxies){
try{
const controller=new AbortController();
const timeout=setTimeout(()=>controller.abort(),6000);
const res=await fetch(proxyUrl,{signal:controller.signal});
clearTimeout(timeout);
if(!res.ok)continue;
const html=await res.text();
if(!html||html.length<200)continue;
const imgUrls=[];
const re=/https?:\/\/[^"'\s<>\\]+(?:jpg|jpeg|png|webp)(?:[^"'\s<>\\]|\\u002F)*/gi;
let m;
while((m=re.exec(html))!==null){
let u=m[0].replace(/\\u002F/g,"/").replace(/\\/g,"");
if(u.includes("xhscdn")||u.includes("sns-img")||u.includes("ci.xiaohongshu")){
if(!imgUrls.includes(u))imgUrls.push(u);
}
}
if(imgUrls.length){
showToast(t(`获取到 ${imgUrls.length} 张照片`,`Fetched ${imgUrls.length} photos`));
return imgUrls.slice(0,10);
}
}catch(e){continue}
}
showToast(t("自动获取失败，请手动复制图片地址粘贴","Auto-fetch failed, paste image URLs manually"));
return [];
}
function extractXhsId(url){
const m=url.match(/\/([a-f0-9]{24})/);
return m?m[1]:null;
}

const carouselPos={};
let touchStartX=0,touchStartId=null;
document.addEventListener("touchstart",function(e){
const wrap=e.target.closest(".card-img-wrap");
if(!wrap)return;
const id=wrap.id.replace("imgwrap-","");
const total=parseInt(document.getElementById("carousel-"+id)?.dataset.total||"0");
if(total>1){touchStartX=e.touches[0].clientX;touchStartId=id}
},{passive:true});
document.addEventListener("touchend",function(e){
if(!touchStartId)return;
const dx=e.changedTouches[0].clientX-touchStartX;
if(Math.abs(dx)>30)slideCarousel(parseInt(touchStartId),dx<0?1:-1);
touchStartId=null;
},{passive:true});

function slideCarousel(id,dir){
const el=document.getElementById("carousel-"+id);
if(!el)return;
const total=parseInt(el.dataset.total)||1;
if(total<2)return;
if(!(id in carouselPos))carouselPos[id]=0;
carouselPos[id]=(carouselPos[id]+dir+total)%total;
const wrap=document.getElementById("imgwrap-"+id);
const w=wrap?wrap.offsetWidth:300;
el.style.transform="translateX(-"+(carouselPos[id]*w)+"px)";
const counter=document.getElementById("counter-"+id);
if(counter)counter.textContent=(carouselPos[id]+1)+"/"+total;
}

const total=parseInt(el.dataset.total)||1;
if(total<1)return;
el.style.width=(total*100)+"%";
el.querySelectorAll("img").forEach(img=>{img.style.width=(100/total)+"%"});
});
}

'<div style="color:#fff;font-size:16px;margin-top:12px;z-index:10001" id="lbCounter">'+(lbIdx+1)+' / '+lbImgs.length+'</div>'+
dotsHtml;

document.body.appendChild(d);

document.getElementById("lbClose").onclick=function(e){e.stopPropagation();closeLightbox()};
document.getElementById("lbCopy").onclick=function(e){e.stopPropagation();navigator.clipboard.writeText(lbImgs[lbIdx]).then(function(){showToast("链接已复制")})};

if(document.getElementById("lbPrev")){
document.getElementById("lbPrev").onclick=function(e){e.stopPropagation();lbNav(-1)};
document.getElementById("lbNext").onclick=function(e){e.stopPropagation();lbNav(1)};
}

var dotsEl=document.getElementById("lbDots");
if(dotsEl){
dotsEl.onclick=function(e){if(e.target.dataset.i!==undefined){lbIdx=parseInt(e.target.dataset.i);lbUpdate()}};
}

var lbTouchX=0;
d.addEventListener("touchstart",function(e){lbTouchX=e.touches[0].clientX},{passive:true});
d.addEventListener("touchend",function(e){
var dx=e.changedTouches[0].clientX-lbTouchX;
if(Math.abs(dx)>50)lbNav(dx<0?1:-1);
},{passive:true});

document.onkeydown=function(e){
if(e.key==="Escape")closeLightbox();
if(e.key==="ArrowLeft")lbNav(-1);
if(e.key==="ArrowRight")lbNav(1);
};
}

function lbNav(dir){lbIdx=(lbIdx+dir+lbImgs.length)%lbImgs.length;lbUpdate()}
function lbUpdate(){
var img=document.getElementById("lbImg");
if(img){img.src=lbImgs[lbIdx]}
var c=document.getElementById("lbCounter");
if(c)c.textContent=(lbIdx+1)+" / "+lbImgs.length;
var dots=document.getElementById("lbDots");
if(dots){var bs=dots.querySelectorAll("button");bs.forEach(function(b,i){b.style.background=i===lbIdx?"#fff":"rgba(255,255,255,.3)"})}
}
function closeLightbox(){var el=document.getElementById("lightbox");if(el)el.remove();document.onkeydown=null}

function removeMember(name){members=members.filter(m=>m!==name);save();renderSettingsMembers();renderAll()}
function clearDays(){if(confirm(t("确定清空所有行程？","Clear all days?"))){days=[];save();renderAll()}}

function autoPlan(){
const mustSee=allItems.filter(it=>it.pri==="red");
const recommended=allItems.filter(it=>it.pri==="yellow");
const all=[...mustSee,...recommended];
const grouped={};
all.forEach(it=>{
if(!grouped[it.district])grouped[it.district]=[];
grouped[it.district].push(it);
});
days=[];
let dayNum=1;
Object.entries(grouped).forEach(([district,items])=>{
if(items.length>0){
days.push({name:`Day ${dayNum} - ${district}`,items:items.map(it=>it.id)});
dayNum++;
}
});
save();renderAll();showToast(t("智能规划完成！已按区域分配行程","Auto-planned by district!"))
}

function updateBudget(){
const val=parseInt(document.getElementById("settingsBudget").value)||0;
const myr=Math.round(val*VND_TO_MYR*100)/100;
document.getElementById("settingsBudgetMYR").textContent="RM"+myr;
}

function exportResults(){
const lines=[`🇻🇳 胡志明市旅行攻略 Pro - 行程导出`,`📅 ${new Date().toLocaleDateString()}`,``];
if(days.length){
lines.push(`=== 行程规划 ===`);
days.forEach(day=>{
lines.push(`\n【${day.name}】`);
day.items.forEach(id=>{
const it=allItems.find(i=>i.id===id);
if(it)lines.push(`  • ${it.name} (${it.nameEn}) - ${it.hours} - ${it.district} - ${it.price}万VND`);
});
});
lines.push(``);
}
if(members.length){
lines.push(`=== 投票结果 ===`);
members.forEach(m=>{
const yes=[],no=[],maybe=[];
allItems.forEach(it=>{const v=(votes[it.id]||{})[m];if(v==="yes")yes.push(it.name);if(v==="no")no.push(it.name);if(v==="maybe")maybe.push(it.name)});
lines.push(`\n【${m}】`);
lines.push(`  ✅ 去: ${yes.join(", ")||"无"}`);
lines.push(`  ❌ 不去: ${no.join(", ")||"无"}`);
lines.push(`  ⏳ 待定: ${maybe.join(", ")||"无"}`);
});
}
const consensus=allItems.filter(it=>members.length&&members.every(m=>(votes[it.id]||{})[m]==="yes"));
if(consensus.length){lines.push(`\n=== 全员共识去 ===`);consensus.forEach(it=>lines.push(`  ⭐ ${it.name}`))}
const text=lines.join("\n");
navigator.clipboard.writeText(text).then(()=>showToast("已复制到剪贴板！")).catch(()=>showToast("复制失败"));
}

function exportData(){
const data={lang,members,votes,stars,notes,days,customItems};
const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;a.download=`hcmc-guide-backup-${new Date().toISOString().slice(0,10)}.json`;
a.click();URL.revokeObjectURL(url);
showToast("数据已导出");
}

function showToast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2500)}

document.addEventListener("keydown",e=>{
if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
if(e.key==="/"){e.preventDefault();document.getElementById("search").focus()}
if(e.key>="1"&&e.key<="8"){const cat=CATS[parseInt(e.key)-1];if(cat)toggleCat(cat.id)}
if(e.key==="d")toggleTheme();
if(e.key==="l")toggleLang();
});

window.addEventListener("scroll",()=>{document.getElementById("scrollTop").classList.toggle("show",window.scrollY>300)});

document.getElementById("search").addEventListener("input",e=>{searchTerm=e.target.value;renderAll()});

if(localStorage.getItem("v5_theme")==="dark"){isDark=true;document.documentElement.setAttribute("data-theme","dark");document.getElementById("themeBtn").textContent="☀️"}
if(lang==="en")document.getElementById("langBtn").textContent="中";
updateSettingsBudget();
renderAll();
</script>
</body>
