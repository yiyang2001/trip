<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>胡志明市旅行攻略 | Ho Chi Minh City Guide</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--text2:#6e6e73;--accent:#0071e3;--border:#e5e5e7;--red:#ff3b30;--yellow:#ffcc00;--green:#34c759;--morning:#ff9500;--afternoon:#ffcc00;--evening:#af52de;--night:#5856d6;--radius:12px}
[data-theme="dark"]{--bg:#1c1c1e;--card:#2c2c2e;--text:#f5f5f7;--text2:#98989d;--border:#3a3a3c}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px}
.header-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text)}
.btn{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);cursor:pointer;font-size:13px;white-space:nowrap}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-icon{padding:6px 10px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{padding:4px 10px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:.2s}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.members-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.member-tag{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:12px;background:#e8f0fe;color:var(--accent)}
.member-tag .rm{cursor:pointer;opacity:.6}
.member-tag .rm:hover{opacity:1}
.add-member{padding:3px 8px;border-radius:12px;font-size:12px;border:1px dashed var(--accent);background:transparent;color:var(--accent);cursor:pointer}
.stats{display:flex;gap:12px;padding:8px 16px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.main{padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:.2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card.hidden{display:none}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-title{font-size:15px;font-weight:600}
.card-title-en{font-size:12px;color:var(--text2);margin-top:2px}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;padding:2px 6px;border-radius:4px}
.badge-cat{background:#e8f0fe;color:#1a73e8}
[data-theme="dark"] .badge-cat{background:#1a3a5c;color:#8ab4f8}
.badge-pri-red{background:#ffe5e5;color:var(--red)}
.badge-pri-yellow{background:#fff8e1;color:#f57c00}
.badge-pri-white{background:#f0f0f0;color:#666}
[data-theme="dark"] .badge-pri-white{background:#3a3a3c;color:#999}
.badge-time{background:#f0f0f0;color:#555}
[data-theme="dark"] .badge-time{background:#3a3a3c;color:#bbb}
.badge-district{background:#e8f5e9;color:#2e7d32}
[data-theme="dark"] .badge-district{background:#1b3a1b;color:#81c784}
.card-info{font-size:13px;color:var(--text2);margin-bottom:4px}
.card-notes{font-size:12px;color:var(--accent);font-style:italic;margin-top:4px}
.card-desc{font-size:13px;margin-top:4px}
.votes{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.vote-btn{padding:3px 8px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text2);transition:.15s}
.vote-btn.voted{font-weight:600}
.vote-btn.v-yes{background:#d4edda;color:#155724;border-color:#c3e6cb}
.vote-btn.v-no{background:#f8d7da;color:#721c24;border-color:#f5c6cb}
.vote-btn.v-maybe{background:#fff3cd;color:#856404;border-color:#ffeeba}
[data-theme="dark"] .vote-btn.v-yes{background:#1b4332;color:#95d5b2;border-color:#2d6a4f}
[data-theme="dark"] .vote-btn.v-no{background:#4a1c1c;color:#f5a3a3;border-color:#6b2c2c}
[data-theme="dark"] .vote-btn.v-maybe{background:#4a3f1c;color:#f5d98a;border-color:#6b5a2c}
.voter-name{font-size:10px;color:var(--text2);margin-right:2px}
.votes-summary{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--text2)}
.summary-bar{display:flex;gap:8px;align-items:center}
.summary-bar span{display:flex;align-items:center;gap:2px}
.district-view .district-group{margin-bottom:20px}
.district-title{font-size:16px;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--accent)}
.export-bar{position:fixed;bottom:16px;right:16px;z-index:99}
.export-btn{padding:10px 20px;border-radius:20px;background:var(--accent);color:#fff;border:none;font-size:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,113,227,.3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:20px;width:90%;max-width:360px}
.modal h3{margin-bottom:12px;font-size:16px}
.modal input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;background:var(--bg);color:var(--text)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;background:#333;color:#fff;font-size:13px;z-index:300;opacity:0;transition:.3s}
.toast.show{opacity:1}
@media(max-width:600px){.grid{grid-template-columns:1fr}.header{padding:8px 12px}.main{padding:12px}}
</style>
</head>
<body>
<div class="header">
<div class="header-top">
<input class="search-box" id="search" placeholder="🔍 搜索景点、餐厅、咖啡厅...">
<button class="btn btn-icon" id="themeBtn" onclick="toggleTheme()">🌙</button>

<button class="btn btn-icon" id="viewBtn" onclick="toggleView()">📍</button>
</div>

<div class="members-bar" id="membersBar">
<span style="font-size:12px;color:var(--text2)">同行人员:</span>
<div id="memberTags"></div>
<button class="add-member" onclick="showAddMember()">+ 添加</button>
</div>
</div>
<div class="stats" id="stats"></div>
<div class="main">
<div class="grid" id="grid"></div>
<div class="district-view hidden" id="districtView"></div>
</div>
<div class="export-bar">
<button class="export-btn" onclick="exportResults()">📋 导出结果</button>
</div>
<div class="modal-overlay" id="modal">
<div class="modal">
<h3 id="modalTitle">添加同行人员</h3>
<input id="memberInput" placeholder="输入名字" onkeydown="if(event.key==='Enter')addMember()">
<div class="modal-btns">
<button class="btn" onclick="hideModal()">取消</button>
<button class="btn active" onclick="addMember()">确定</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

];

const PRI={red:{zh:"必去",en:"Must-see"},yellow:{zh:"推荐",en:"Recommended"},white:{zh:"可选",en:"Optional"}};
const TIME_ICONS={morning:{zh:"🌅晨",en:"🌅AM"},afternoon:{zh:"☀️午",en:"☀️PM"},evening:{zh:"🌆晚",en:"🌆Eve"},night:{zh:"🌙夜",en:"🌙Night"},lunch:{zh:"🍽️午",en:"🍽️Lunch"},dinner:{zh:"🍽️晚",en:"🍽️Dinner"}};

let lang=localStorage.getItem("v3_lang")||"zh";
let members=JSON.parse(localStorage.getItem("v3_members")||"[]");
let votes=JSON.parse(localStorage.getItem("v3_votes")||"{}");
let activeCats=new Set();
let searchTerm="";
let viewMode="card";
let isDark=false;

function save(){localStorage.setItem("v3_lang",lang);localStorage.setItem("v3_members",JSON.stringify(members));localStorage.setItem("v3_votes",JSON.stringify(votes))}

function t(zh,en){return lang==="en"?en:zh}

function renderFilters(){
const el=document.getElementById("filters");
el.innerHTML=CATS.map(c=>`<span class="chip ${activeCats.has(c.id)?"active":""}" onclick="toggleCat('${c.id}')">${c.icon} ${t(c.zh,c.en)}</span>`).join("");
}

function renderMembers(){
const el=document.getElementById("memberTags");
el.innerHTML=members.map(m=>`<span class="member-tag">${m}<span class="rm" onclick="removeMember('${m}')">×</span></span>`).join("");
}

function renderCards(){
const grid=document.getElementById("grid");
const dview=document.getElementById("districtView");
const q=searchTerm.toLowerCase();
const filtered=ITEMS.filter(it=>{
if(activeCats.size&&!activeCats.has(it.cat))return false;
if(q&&!it.name.toLowerCase().includes(q)&&!it.nameEn.toLowerCase().includes(q)&&!it.notes.toLowerCase().includes(q)&&!it.notesEn.toLowerCase().includes(q)&&!it.district.toLowerCase().includes(q))return false;
return true;
});

const priOrder={red:0,yellow:1,white:2};
filtered.sort((a,b)=>priOrder[a.pri]-priOrder[b.pri]);

const cat=CATS.find(c=>c.id===filtered[0]?.cat);
const catCounts={};
filtered.forEach(it=>{catCounts[it.cat]=(catCounts[it.cat]||0)+1});

document.getElementById("stats").innerHTML=`<span>${filtered.length} / ${ITEMS.length} 项</span>`+
CATS.filter(c=>catCounts[c.id]).map(c=>`<span>${c.icon}${t(c.zh,c.en)}: ${catCounts[c.id]}</span>`).join("");

function cardHtml(it){
const catObj=CATS.find(c=>c.id===it.cat);
const timeTags=it.time.map(t=>TIME_ICONS[t]||t).join(" ");
const votesForItem=votes[it.id]||{};
const vSummary={yes:0,no:0,maybe:0};
members.forEach(m=>{if(votesForItem[m]==="yes")vSummary.yes++;if(votesForItem[m]==="no")vSummary.no++;if(votesForItem[m]==="maybe")vSummary.maybe++});
const voterHtml=members.map(m=>{
const v=votesForItem[m]||"";
return `<span class="voter-name">${m}</span>
<button class="vote-btn ${v==="yes"?"voted v-yes":""}${v==="no"?"voted v-no":""}${v==="maybe"?"voted v-maybe":""}" onclick="vote(${it.id},'${m}','yes')">✅</button>
<button class="vote-btn ${v==="no"?"voted v-no":""}" onclick="vote(${it.id},'${m}','no')">❌</button>
<button class="vote-btn ${v==="maybe"?"voted v-maybe":""}" onclick="vote(${it.id},'${m}','maybe')">⏳</button>`;
}).join("");

return `<div class="card" data-id="${it.id}">
<div class="card-head">
<div><div class="card-title">${it.name}</div><div class="card-title-en">${it.nameEn}</div></div>
</div>
<div class="card-badges">
<span class="badge badge-cat">${catObj.icon} ${t(catObj.zh,catObj.en)}</span>
<span class="badge badge-pri-${it.pri}">${PRI[it.pri][lang==="en"?"en":"zh"]}</span>
${it.time.map(ti=>`<span class="badge badge-time">${TIME_ICONS[ti]||ti}</span>`).join("")}
<span class="badge badge-district">📍 ${it.district}</span>
</div>
<div class="card-info">🕐 ${it.hours}</div>
<div class="card-desc">${lang==="en"?it.notesEn:it.notes}</div>
${it.desc?`<div class="card-notes">${lang==="en"?"":"💡 "}${it.desc}</div>`:""}
${members.length?`<div class="votes">${voterHtml}</div>
<div class="votes-summary">
<div class="summary-bar">
<span>✅ ${vSummary.yes}</span><span>❌ ${vSummary.no}</span><span>⏳ ${vSummary.maybe}</span>
</div></div>`:""}
</div>`;
}

if(viewMode==="card"){
grid.classList.remove("hidden");
dview.classList.add("hidden");
grid.innerHTML=filtered.map(cardHtml).join("");
}else{
grid.classList.add("hidden");
dview.classList.remove("hidden");
const groups={};
filtered.forEach(it=>{if(!groups[it.district])groups[it.district]=[];groups[it.district].push(it)});
const order=["第一郡","第三郡","第五郡","Bình Thạnh","第十郡","周边"];
dview.innerHTML=order.filter(d=>groups[d]).map(d=>`<div class="district-group"><div class="district-title">📍 ${d} (${groups[d].length})</div><div class="grid">${groups[d].map(cardHtml).join("")}</div></div>`).join("");
}
}

function toggleCat(id){if(activeCats.has(id))activeCats.delete(id);else activeCats.add(id);renderFilters();renderCards()}
function toggleLang(){lang=lang==="zh"?"en":"zh";document.getElementById("langBtn").textContent=lang==="zh"?"EN":"中";save();renderFilters();renderCards()}
function toggleView(){viewMode=viewMode==="card"?"district":"card";document.getElementById("viewBtn").textContent=viewMode==="card"?"📍":"📋";renderCards()}
function toggleTheme(){isDark=!isDark;document.documentElement.setAttribute("data-theme",isDark?"dark":"");document.getElementById("themeBtn").textContent=isDark?"☀️":"🌙";localStorage.setItem("v3_theme",isDark?"dark":"")}

document.getElementById("search").addEventListener("input",e=>{searchTerm=e.target.value;renderCards()});

function vote(itemId,member,value){
if(!votes[itemId])votes[itemId]={};
const cur=votes[itemId][member];
votes[itemId][member]=cur===value?"":value;
save();renderCards();
}

function showAddMember(){document.getElementById("modal").classList.add("show");document.getElementById("memberInput").focus()}
function hideModal(){document.getElementById("modal").classList.remove("show");document.getElementById("memberInput").value=""}
function addMember(){
const name=document.getElementById("memberInput").value.trim();
if(!name)return;
if(!members.includes(name)){members.push(name);save();renderMembers();renderCards()}
hideModal();
}
function removeMember(name){members=members.filter(m=>m!==name);save();renderMembers();renderCards()}

function exportResults(){
const lines=[`胡志明市旅行攻略 - 投票结果 / HCMC Travel Guide - Voting Results`,`日期: ${new Date().toLocaleDateString()}`,``];
if(members.length){
lines.push(`同行人员: ${members.join(", ")}`,``);
const summary={};
members.forEach(m=>{summary[m]={yes:[],no:[],maybe:[]}});
ITEMS.forEach(it=>{
const v=votes[it.id]||{};
members.forEach(m=>{
if(v[m]==="yes")summary[m].yes.push(it.name);
if(v[m]==="no")summary[m].no.push(it.name);
if(v[m]==="maybe")summary[m].maybe.push(it.name);
});
});
members.forEach(m=>{
lines.push(`【${m}】`);
lines.push(`  ✅ 去: ${summary[m].yes.length?summary[m].yes.join(", "):(lang==="zh"?"无":"None")}`);
lines.push(`  ❌ 不去: ${summary[m].no.length?summary[m].no.join(", "):(lang==="zh"?"无":"None")}`);
lines.push(`  ⏳ 待定: ${summary[m].maybe.length?summary[m].maybe.join(", "):(lang==="zh"?"无":"None")}`);
lines.push(``);
});
lines.push(`共识去: ${ITEMS.filter(it=>members.every(m=>(votes[it.id]||{})[m]==="yes")).map(it=>it.name).join(", ")||"(无)"}`);
lines.push(`共识不去: ${ITEMS.filter(it=>members.every(m=>(votes[it.id]||{})[m]==="no")).map(it=>it.name).join(", ")||"(无)"}`);
}else{
lines.push("(未添加同行人员，无投票数据)");
}
const text=lines.join("\n");
navigator.clipboard.writeText(text).then(()=>showToast("已复制到剪贴板！")).catch(()=>showToast("复制失败，请手动复制"));
}

function showToast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2000)}

// Init
if(localStorage.getItem("v3_theme")==="dark"){isDark=true;document.documentElement.setAttribute("data-theme","dark");document.getElementById("themeBtn").textContent="☀️"}
if(lang==="en")document.getElementById("langBtn").textContent="中";
renderFilters();renderMembers();renderCards();
</script>
</body>
</html>
